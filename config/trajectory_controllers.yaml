controller_manager:
  ros__parameters:
    update_rate: 1000
    arm_joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    arm_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    reaction_wheel_effort_controller:
      type: forward_command_controller/ForwardCommandController

arm_trajectory_controller:
  ros__parameters:
    joints:
      - arm_joint_1
      - arm_joint_2
      - arm_joint_3
      - arm_joint_4
      - arm_joint_5
      - arm_joint_6
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: false
    open_loop_control: false
    action_monitor_rate: 20.0
    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 0.0
    gains:
      arm_joint_1: {p: 14.0, i: 0.0, d: 4.0, i_clamp: 0.0}
      arm_joint_2: {p: 14.0, i: 0.0, d: 4.0, i_clamp: 0.0}
      arm_joint_3: {p: 12.0, i: 0.0, d: 3.5, i_clamp: 0.0}
      arm_joint_4: {p: 9.0, i: 0.0, d: 2.5, i_clamp: 0.0}
      arm_joint_5: {p: 7.0, i: 0.0, d: 2.0, i_clamp: 0.0}
      arm_joint_6: {p: 5.0, i: 0.0, d: 1.5, i_clamp: 0.0}

reaction_wheel_effort_controller:
  ros__parameters:
    joints:
      - wheel_joint_x
      - wheel_joint_y
      - wheel_joint_z
    interface_name: effort
